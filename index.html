<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Gemini Translator Go</title>
  
  <!-- 【CSS 區塊】載入 Tailwind CSS 與自訂樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { 
      overscroll-behavior-y: none; 
      -webkit-touch-callout: none; 
      -webkit-user-select: none;   
      user-select: none;
      background-color: #F9FBFF;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .allow-select {
      -webkit-user-select: text;
      user-select: text;
    }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    /* 隱藏與顯示的輔助 class */
    .hidden-block { display: none !important; }
  </style>
</head>
<body class="min-h-[100dvh] flex flex-col pb-[env(safe-area-inset-bottom)] pt-[env(safe-area-inset-top)]">

  <!-- 隱藏的系統相機上傳元件 -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden-block" />

  <!-- 【HTML 區塊】App UI 結構 -->
  <!-- Header -->
  <header class="px-6 pt-6 pb-4 sticky top-0 bg-white/80 backdrop-blur-3xl z-40 flex items-center justify-between border-b border-slate-100 shadow-sm shadow-slate-100/50">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md shadow-indigo-200">
        <i data-lucide="zap" class="text-white w-4 h-4 fill-white"></i>
      </div>
      <h1 class="text-lg font-black italic tracking-tighter text-slate-900">GEMINI GO</h1>
    </div>
  </header>

  <!-- 主內容區 -->
  <main class="px-4 max-w-lg mx-auto w-full flex-grow py-6 overflow-y-auto pb-32">
    
    <!-- 翻譯分頁 -->
    <div id="tab-translate" class="space-y-6">
      
      <!-- 輸入卡片 -->
      <div class="bg-white rounded-[2rem] shadow-xl shadow-indigo-100/20 border border-indigo-50 overflow-hidden relative">
        <!-- 語氣選擇器 -->
        <div class="px-5 pt-4 pb-2 flex gap-2 overflow-x-auto whitespace-nowrap border-b border-slate-50" style="scrollbar-width: none;">
          <button onclick="setTone('standard')" id="tone-standard" class="tone-btn px-3 py-1.5 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white shadow-md shadow-indigo-200">預設標準</button>
          <button onclick="setTone('formal')" id="tone-formal" class="tone-btn px-3 py-1.5 rounded-xl text-xs font-bold transition-all bg-slate-50 text-slate-400 active:scale-95">💼 商務正式</button>
          <button onclick="setTone('casual')" id="tone-casual" class="tone-btn px-3 py-1.5 rounded-xl text-xs font-bold transition-all bg-slate-50 text-slate-400 active:scale-95">☕ 輕鬆日常</button>
          <button onclick="setTone('cute')" id="tone-cute" class="tone-btn px-3 py-1.5 rounded-xl text-xs font-bold transition-all bg-slate-50 text-slate-400 active:scale-95">✨ 活潑可愛</button>
        </div>
        
        <textarea id="inputText" placeholder="輸入文字、語音或拍照..." class="allow-select w-full h-36 p-6 pr-16 text-lg outline-none resize-none bg-transparent placeholder:text-slate-300 text-slate-800 font-medium leading-relaxed transition-colors"></textarea>
        
        <div class="absolute right-3 top-[3.5rem] flex flex-col gap-2">
          <button id="btn-mic" onclick="toggleMic()" class="w-11 h-11 rounded-2xl flex items-center justify-center shadow-md transition-all bg-slate-50 text-indigo-600 active:scale-90">
            <i data-lucide="mic" class="w-5 h-5"></i>
          </button>
          <button onclick="openCamera()" class="w-11 h-11 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg shadow-indigo-200 active:scale-90 transition-all">
            <i data-lucide="camera" class="w-5 h-5"></i>
          </button>
        </div>
        
        <div class="px-6 py-4 bg-slate-50 flex justify-between items-center border-t border-slate-50">
          <div class="flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
            <span id="status-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ready</span>
          </div>
          <div class="flex gap-3">
            <button onclick="clearInput()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm text-slate-400 active:scale-95">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
            <button id="btn-translate" onclick="executeTranslation()" class="bg-indigo-600 text-white px-6 h-10 rounded-xl text-sm font-bold shadow-md shadow-indigo-200 active:scale-95 transition-all disabled:opacity-30">
              翻譯
            </button>
          </div>
        </div>
      </div>

      <!-- AI 分析 -->
      <div id="analysis-box" class="hidden-block bg-indigo-600 rounded-3xl p-5 text-white shadow-lg shadow-indigo-200 flex gap-4 items-start allow-select">
        <i data-lucide="book-open" class="opacity-70 mt-1 flex-shrink-0 w-5 h-5"></i>
        <div class="flex-grow">
          <h4 class="text-[10px] font-black opacity-60 uppercase tracking-[0.2em] mb-1">AI Smart Analysis</h4>
          <p id="analysis-text" class="text-sm font-medium leading-relaxed whitespace-pre-wrap"></p>
        </div>
      </div>

      <!-- 翻譯結果區塊 -->
      <div id="results-container" class="space-y-4 hidden-block">
        <!-- 中文 -->
        <div class="bg-white border border-slate-100 rounded-[2rem] p-5 flex gap-4 items-start shadow-sm active:scale-[0.99] transition-all">
          <div class="flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center font-black text-sm border shadow-inner mt-0.5 bg-rose-50/50 border-rose-100 text-rose-500">中</div>
          <div class="flex-grow min-w-0 pt-1 allow-select">
            <div id="res-zh" class="text-[16px] font-bold text-slate-800 leading-relaxed break-words whitespace-pre-wrap"></div>
          </div>
          <div class="flex flex-col gap-2 flex-shrink-0 mt-0.5">
            <button onclick="handleSpeak('zh')" id="btn-play-zh" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
            <button onclick="copyText('zh')" id="btn-copy-zh" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="copy" class="w-4 h-4"></i></button>
          </div>
        </div>
        <!-- 英文 -->
        <div class="bg-white border border-slate-100 rounded-[2rem] p-5 flex gap-4 items-start shadow-sm active:scale-[0.99] transition-all">
          <div class="flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center font-black text-sm border shadow-inner mt-0.5 bg-indigo-600 text-white border-indigo-600">EN</div>
          <div class="flex-grow min-w-0 pt-1 allow-select">
            <div id="res-en" class="text-[16px] font-bold text-slate-800 leading-relaxed break-words whitespace-pre-wrap"></div>
            <div id="res-en_ipa" class="text-[12px] font-mono text-indigo-500 mt-2 opacity-90 tracking-tight bg-indigo-50/50 px-2 py-1 rounded-lg self-start"></div>
          </div>
          <div class="flex flex-col gap-2 flex-shrink-0 mt-0.5">
            <button onclick="handleSpeak('en')" id="btn-play-en" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
            <button onclick="copyText('en')" id="btn-copy-en" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="copy" class="w-4 h-4"></i></button>
          </div>
        </div>
        <!-- 韓文 -->
        <div class="bg-white border border-slate-100 rounded-[2rem] p-5 flex gap-4 items-start shadow-sm active:scale-[0.99] transition-all">
          <div class="flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center font-black text-sm border shadow-inner mt-0.5 bg-emerald-50/50 border-emerald-100 text-emerald-500">韓</div>
          <div class="flex-grow min-w-0 pt-1 allow-select">
            <div id="res-ko" class="text-[16px] font-bold text-slate-800 leading-relaxed break-words whitespace-pre-wrap"></div>
          </div>
          <div class="flex flex-col gap-2 flex-shrink-0 mt-0.5">
            <button onclick="handleSpeak('ko')" id="btn-play-ko" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
            <button onclick="copyText('ko')" id="btn-copy-ko" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="copy" class="w-4 h-4"></i></button>
          </div>
        </div>
        <!-- 日文 -->
        <div class="bg-white border border-slate-100 rounded-[2rem] p-5 flex gap-4 items-start shadow-sm active:scale-[0.99] transition-all">
          <div class="flex-shrink-0 w-11 h-11 rounded-2xl flex items-center justify-center font-black text-sm border shadow-inner mt-0.5 bg-amber-50/50 border-amber-100 text-amber-500">日</div>
          <div class="flex-grow min-w-0 pt-1 allow-select">
            <div id="res-ja" class="text-[16px] font-bold text-slate-800 leading-relaxed break-words whitespace-pre-wrap"></div>
          </div>
          <div class="flex flex-col gap-2 flex-shrink-0 mt-0.5">
            <button onclick="handleSpeak('ja')" id="btn-play-ja" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
            <button onclick="copyText('ja')" id="btn-copy-ja" class="p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90"><i data-lucide="copy" class="w-4 h-4"></i></button>
          </div>
        </div>
      </div>

      <!-- 智慧建議 -->
      <div id="suggestions-box" class="hidden-block bg-gradient-to-br from-indigo-50 to-blue-50/30 border border-indigo-100 rounded-[2rem] p-5 shadow-sm shadow-indigo-100/20 mt-4">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <i data-lucide="wand-2" class="text-indigo-600 w-4 h-4"></i>
            <h4 class="text-xs font-black text-indigo-800 tracking-wider">✨ AI 智慧延伸對話</h4>
          </div>
          <button id="btn-generate-suggestions" onclick="generateSuggestions()" class="text-[10px] font-bold text-indigo-600 bg-white px-3 py-1.5 rounded-full shadow-sm active:scale-95">產生建議</button>
        </div>
        <div id="suggestions-list" class="flex flex-col gap-2 mt-3"></div>
      </div>

    </div>

    <!-- 歷史分頁 -->
    <div id="tab-history" class="hidden-block space-y-4">
      <div class="flex justify-between items-center px-2">
        <h3 class="text-xl font-black italic text-slate-800">History</h3>
        <button onclick="clearHistory()" class="text-[10px] font-bold text-rose-500 uppercase flex items-center gap-1 bg-rose-50 px-3 py-1.5 rounded-full active:scale-95">
          <i data-lucide="trash-2" class="w-3 h-3"></i> Clear
        </button>
      </div>
      <div id="history-list" class="space-y-4">
        <!-- JS 動態產生歷史記錄 -->
      </div>
    </div>

  </main>

  <!-- 底部導航 -->
  <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center px-6 pt-4 pb-[calc(1rem+env(safe-area-inset-bottom))] z-[80]">
    <button onclick="switchTab('translate')" id="nav-translate" class="flex flex-col items-center gap-1 transition-all text-indigo-600 scale-110">
      <i data-lucide="languages" class="w-6 h-6"></i>
      <span class="text-[10px] font-black uppercase tracking-tighter">Translate</span>
    </button>
    <button onclick="document.getElementById('cameraInput').click()" class="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center -mt-10 border-4 border-white shadow-lg shadow-indigo-200 active:scale-90 transition-all">
      <i data-lucide="camera" class="w-6 h-6"></i>
    </button>
    <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center gap-1 transition-all text-slate-400">
      <i data-lucide="history" class="w-6 h-6"></i>
      <span class="text-[10px] font-black uppercase tracking-tighter">History</span>
    </button>
  </nav>

  <!-- 相機覆蓋層 (全螢幕) -->
  <div id="camera-overlay" class="hidden-block fixed inset-0 bg-black z-[100] flex flex-col text-white pb-[env(safe-area-inset-bottom)] pt-[env(safe-area-inset-top)]">
    <div class="p-4 pt-6 flex justify-between items-center z-10">
      <button onclick="closeCamera()" class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-xl active:scale-90"><i data-lucide="x" class="w-6 h-6"></i></button>
    </div>
    <div class="absolute inset-0 flex items-center justify-center overflow-hidden">
      <video id="videoElement" autoplay playsinline muted class="w-full h-full object-cover"></video>
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="w-[85vw] h-[30vh] border-2 border-white/50 rounded-[2rem] shadow-[0_0_0_100vw_rgba(0,0,0,0.7)] relative"></div>
      </div>
    </div>
    <div class="absolute bottom-10 inset-x-0 flex justify-center z-10">
      <button onclick="capturePhoto()" class="w-20 h-20 bg-white rounded-full flex items-center justify-center active:scale-90 transition-transform">
        <div class="w-16 h-16 border-[5px] border-slate-900 rounded-full"></div>
      </button>
    </div>
  </div>

  <canvas id="canvasElement" class="hidden-block"></canvas>
  
  <!-- 錯誤提示條 -->
  <div id="error-toast" class="hidden-block fixed top-[env(safe-area-inset-top)] left-6 right-6 mt-4 bg-slate-900 text-white p-4 rounded-2xl text-xs font-bold text-center z-[200] shadow-2xl transition-all"></div>

  <!-- 【JavaScript 區塊】App 邏輯 -->
  <script>
    // 初始化 Lucide Icons
    lucide.createIcons();

    // 全域變數與 API
    const API_KEY = ""; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`;
    const TTS_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`;

    let state = {
      tone: 'standard',
      isListening: false,
      isLoading: false,
      history: JSON.parse(localStorage.getItem('gemini_history') || '[]'),
      translations: null
    };

    let recognition = null;
    let stream = null;
    let playingAudio = null;

    // 初始化語音辨識
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.lang = 'zh-TW';
      recognition.onstart = () => updateListeningUI(true);
      recognition.onend = () => updateListeningUI(false);
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById('inputText').value = text;
        executeTranslation();
      };
    }

    // UI 控制函式
    function switchTab(tab) {
      document.getElementById('tab-translate').classList.toggle('hidden-block', tab !== 'translate');
      document.getElementById('tab-history').classList.toggle('hidden-block', tab !== 'history');
      
      document.getElementById('nav-translate').className = `flex flex-col items-center gap-1 transition-all ${tab === 'translate' ? 'text-indigo-600 scale-110' : 'text-slate-400'}`;
      document.getElementById('nav-history').className = `flex flex-col items-center gap-1 transition-all ${tab === 'history' ? 'text-indigo-600 scale-110' : 'text-slate-400'}`;
      
      if (tab === 'history') renderHistory();
    }

    function setTone(tone) {
      state.tone = tone;
      const tones = ['standard', 'formal', 'casual', 'cute'];
      tones.forEach(t => {
        const btn = document.getElementById(`tone-${t}`);
        if (t === tone) {
          btn.className = "tone-btn px-3 py-1.5 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white shadow-md shadow-indigo-200";
        } else {
          btn.className = "tone-btn px-3 py-1.5 rounded-xl text-xs font-bold transition-all bg-slate-50 text-slate-400 active:scale-95";
        }
      });
    }

    function clearInput() {
      document.getElementById('inputText').value = '';
      document.getElementById('results-container').classList.add('hidden-block');
      document.getElementById('analysis-box').classList.add('hidden-block');
      document.getElementById('suggestions-box').classList.add('hidden-block');
      state.translations = null;
    }

    function showError(msg) {
      const toast = document.getElementById('error-toast');
      toast.innerText = msg;
      toast.classList.remove('hidden-block');
      setTimeout(() => toast.classList.add('hidden-block'), 3000);
    }

    function updateLoadingUI(isLoading) {
      state.isLoading = isLoading;
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const btn = document.getElementById('btn-translate');
      
      if (isLoading) {
        dot.className = "w-2 h-2 rounded-full bg-indigo-600 animate-ping";
        text.innerText = "Processing";
        btn.disabled = true;
        btn.classList.add('opacity-30');
      } else {
        dot.className = "w-2 h-2 rounded-full bg-slate-300";
        text.innerText = "Ready";
        btn.disabled = false;
        btn.classList.remove('opacity-30');
      }
    }

    function updateListeningUI(isListening) {
      state.isListening = isListening;
      const input = document.getElementById('inputText');
      const btn = document.getElementById('btn-mic');
      
      if (isListening) {
        input.classList.add('bg-rose-50/30');
        input.placeholder = "聆聽中...";
        btn.className = "w-11 h-11 rounded-2xl flex items-center justify-center shadow-md transition-all bg-rose-500 text-white animate-pulse shadow-rose-200";
      } else {
        input.classList.remove('bg-rose-50/30');
        input.placeholder = "輸入文字、語音或拍照...";
        btn.className = "w-11 h-11 rounded-2xl flex items-center justify-center shadow-md transition-all bg-slate-50 text-indigo-600 active:scale-90";
      }
    }

    function toggleMic() {
      if (!recognition) return showError("您的瀏覽器不支援語音辨識");
      if (state.isListening) recognition.stop();
      else recognition.start();
    }

    // 核心翻譯 API 呼叫
    async function executeTranslation(textOverride = null, imageBase64 = null) {
      const text = textOverride !== null ? textOverride : document.getElementById('inputText').value.trim();
      if (!text && !imageBase64) return;
      
      if (textOverride) document.getElementById('inputText').value = textOverride;
      
      updateLoadingUI(true);
      document.getElementById('suggestions-box').classList.add('hidden-block');

      const tonePrompt = {
        standard: "語氣自然流暢。",
        formal: "使用正式、禮貌、商務的敬語語氣。",
        casual: "使用非常輕鬆、日常、朋友間對話的口語。",
        cute: "使用活潑、可愛、生動的語氣。"
      }[state.tone];

      const payload = {
        contents: [{
          parts: [
            { text: `辨識並翻譯至繁體中文(zh)、英文(en)、韓文(ko)、日文(ja)。英文需附美式音標(en_ipa)。並在 'analysis' 提供簡短解析。${tonePrompt} 回傳 JSON。` },
            imageBase64 ? { inlineData: { mimeType: "image/jpeg", data: imageBase64 } } : { text: text }
          ]
        }],
        generationConfig: { 
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              zh: { type: "STRING" }, en: { type: "STRING" }, en_ipa: { type: "STRING" },
              ko: { type: "STRING" }, ja: { type: "STRING" }, analysis: { type: "STRING" }
            }
          }
        }
      };

      try {
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        const result = JSON.parse(data.candidates[0].content.parts[0].text);
        state.translations = result;
        
        // 更新結果 UI
        document.getElementById('results-container').classList.remove('hidden-block');
        ['zh', 'en', 'ko', 'ja'].forEach(lang => {
          document.getElementById(`res-${lang}`).innerText = result[lang];
        });
        document.getElementById('res-en_ipa').innerText = result.en_ipa;
        
        // 更新分析 UI
        if (result.analysis) {
          document.getElementById('analysis-box').classList.remove('hidden-block');
          document.getElementById('analysis-text').innerText = result.analysis;
        }

        document.getElementById('suggestions-box').classList.remove('hidden-block');
        document.getElementById('suggestions-list').innerHTML = ''; // 清空先前的建議

        // 儲存歷史
        const newHistory = {
          id: Date.now(),
          input: text || "影像翻譯",
          output: result.zh,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        state.history = [newHistory, ...state.history].slice(0, 20);
        localStorage.setItem('gemini_history', JSON.stringify(state.history));
        
        if (document.getElementById('camera-overlay').classList.contains('hidden-block') === false) {
          closeCamera();
        }
      } catch (err) {
        showError("翻譯失敗，請檢查網路連線");
      } finally {
        updateLoadingUI(false);
      }
    }

    // 產生延伸建議 API
    async function generateSuggestions() {
      if (!state.translations || !state.translations.zh) return;
      const btn = document.getElementById('btn-generate-suggestions');
      btn.innerText = "思考中...";
      btn.disabled = true;

      const payload = {
        contents: [{ parts: [{ text: `根據對話內容：「${state.translations.zh}」，推測 3 句「繁體中文」簡短回覆。JSON 陣列回傳：["句子1", "句子2", "句子3"]。` }] }],
        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "STRING" } } }
      };

      try {
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        const result = JSON.parse(data.candidates[0].content.parts[0].text);
        
        const list = document.getElementById('suggestions-list');
        list.innerHTML = '';
        result.forEach(s => {
          const btn = document.createElement('button');
          btn.className = "text-left px-4 py-3 bg-white border border-indigo-100 rounded-2xl text-sm font-bold text-slate-700 shadow-sm hover:text-indigo-600 active:scale-[0.98] transition-all flex items-center justify-between";
          btn.innerHTML = `<span class="truncate pr-4">${s}</span><i data-lucide="message-circle" class="text-indigo-300 w-4 h-4"></i>`;
          btn.onclick = () => executeTranslation(s);
          list.appendChild(btn);
        });
        lucide.createIcons();
      } catch (err) {
        showError("無法產生建議");
      } finally {
        btn.innerText = "產生建議";
        btn.disabled = false;
      }
    }

    // 語音播放 API
    async function handleSpeak(lang) {
      if (!state.translations || playingAudio) return;
      
      const text = state.translations[lang];
      if (!text) return;

      const btn = document.getElementById(`btn-play-${lang}`);
      const originalIcon = btn.innerHTML;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin text-white"></i>`;
      btn.className = "p-3.5 rounded-2xl transition-all shadow-sm bg-indigo-600 text-white animate-pulse";
      lucide.createIcons();

      const voices = { zh: "Kore", en: "Zephyr", ko: "Kore", ja: "Kore" };
      try {
        const res = await fetch(TTS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `Say in ${lang}: ${text}` }] }],
            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voices[lang] } } } }
          })
        });
        const data = await res.json();
        const pcm = data.candidates[0].content.parts[0].inlineData.data;
        playingAudio = new Audio(URL.createObjectURL(pcmToWav(pcm)));
        playingAudio.onended = () => {
          playingAudio = null;
          resetPlayBtn(btn, originalIcon);
        };
        playingAudio.play();
      } catch {
        playingAudio = null;
        resetPlayBtn(btn, originalIcon);
      }
    }

    function resetPlayBtn(btn, iconHTML) {
      btn.innerHTML = iconHTML;
      btn.className = "p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90";
    }

    // PCM 轉 WAV
    function pcmToWav(base64) {
      const bin = window.atob(base64); const buf = new ArrayBuffer(44 + bin.length); const view = new DataView(buf);
      const s = (o, str) => { for (let i = 0; i < str.length; i++) view.setUint8(o + i, str.charCodeAt(i)); };
      s(0, 'RIFF'); view.setUint32(4, 36 + bin.length, true); s(8, 'WAVE'); s(12, 'fmt ');
      view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
      view.setUint32(24, 24000, true); view.setUint32(28, 48000, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
      s(36, 'data'); view.setUint32(40, bin.length, true);
      new Uint8Array(buf, 44).set(new Uint8Array(bin.length).map((_, i) => bin.charCodeAt(i)));
      return new Blob([buf], { type: 'audio/wav' });
    }

    // 複製文字
    function copyText(lang) {
      if (!state.translations) return;
      const text = state.translations[lang];
      const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el);
      el.select(); document.execCommand('copy'); document.body.removeChild(el);
      
      const btn = document.getElementById(`btn-copy-${lang}`);
      const originalHTML = btn.innerHTML;
      btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-white"></i>`;
      btn.className = "p-3.5 rounded-2xl transition-all shadow-sm bg-emerald-500 text-white active:scale-90";
      lucide.createIcons();

      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.className = "p-3.5 rounded-2xl transition-all shadow-sm bg-slate-50 text-slate-400 active:scale-90";
      }, 1500);
    }

    // 歷史記錄渲染
    function renderHistory() {
      const list = document.getElementById('history-list');
      if (state.history.length === 0) {
        list.innerHTML = `<div class="py-20 text-center opacity-30"><i data-lucide="languages" class="mx-auto mb-3 w-10 h-10"></i><p class="font-bold text-sm">無歷史記錄</p></div>`;
      } else {
        list.innerHTML = state.history.map(item => `
          <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col gap-2 active:scale-[0.98] transition-all allow-select">
            <p class="text-[10px] font-black text-slate-300">${item.timestamp}</p>
            <p class="text-[15px] font-bold text-slate-800 line-clamp-2">${item.input}</p>
            <div class="h-px w-full bg-slate-50 my-1"></div>
            <p class="text-[13px] text-indigo-600 font-bold line-clamp-3">${item.output}</p>
          </div>
        `).join('');
      }
      lucide.createIcons();
    }

    function clearHistory() {
      state.history = [];
      localStorage.removeItem('gemini_history');
      renderHistory();
    }

    // 原生相機上傳處理
    document.getElementById('cameraInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => executeTranslation(null, reader.result.split(',')[1]);
      reader.readAsDataURL(file);
      e.target.value = '';
    });

    // 網頁版相機預覽控制
    async function openCamera() {
      document.getElementById('camera-overlay').classList.remove('hidden-block');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } });
        document.getElementById('videoElement').srcObject = stream;
      } catch (err) {
        showError("無法開啟相機，請允許權限或改用系統相機");
      }
    }

    function closeCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      document.getElementById('camera-overlay').classList.add('hidden-block');
    }

    function capturePhoto() {
      const video = document.getElementById('videoElement');
      const canvas = document.getElementById('canvasElement');
      if (!video.videoWidth) return;
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      executeTranslation(null, canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
    }
  </script>
</body>
</html>
